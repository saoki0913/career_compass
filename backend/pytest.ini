[pytest]
pythonpath = .
markers =
    integration: tests that use live external search or other integration dependencies
    slow: tests that are intentionally slow to run
    llm_judge: LLM judge tests (cost) — run manually with --run-llm flag
    calibration: interview scoring calibration (IAA measurement, expensive LLM calls)
    uses_company_context: tests that create/use a company resource from staging search
    no_company_context: tests that run without any company resource dependency
