name: Company PDF OCR Cron

on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: company-pdf-ocr-cron
  cancel-in-progress: false

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger company PDF OCR cron endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          CRON_URL: https://www.shupass.jp/api/cron/company-info-pdf-ocr
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET is not configured" >&2
            exit 1
          fi

          curl --fail --show-error --silent \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$CRON_URL"
