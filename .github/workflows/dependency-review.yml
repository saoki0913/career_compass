name: Dependency Review

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Repository must enable Dependency graph (Settings → Code security) or this step errors.
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
