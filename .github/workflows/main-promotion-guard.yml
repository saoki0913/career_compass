name: Main Promotion Guard

on:
  pull_request:
    branches:
      - main

jobs:
  source-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Require develop as PR source
        run: |
          if [ "${{ github.head_ref }}" != "develop" ]; then
            echo "main への PR は develop からのみ許可します。" >&2
            echo "current source branch: ${{ github.head_ref }}" >&2
            exit 1
          fi

  verify:
    needs: source-branch
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_APP_URL: https://www.shupass.jp
      BETTER_AUTH_URL: https://www.shupass.jp
      BETTER_AUTH_TRUSTED_ORIGINS: https://www.shupass.jp,https://shupass.jp,http://localhost:3000,http://127.0.0.1:3000
      BETTER_AUTH_SECRET: ci-secret-please-change-me-32chars
      GOOGLE_CLIENT_ID: ci-google-client-id
      GOOGLE_CLIENT_SECRET: ci-google-client-secret
      FASTAPI_URL: https://career-compass-backend.up.railway.app
      BACKEND_URL: https://career-compass-backend.up.railway.app
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
      DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: ci-supabase-service-role-key
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      CRON_SECRET: ci-cron-secret
      STRIPE_SECRET_KEY: sk_test_ci
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_ci
      STRIPE_WEBHOOK_SECRET: whsec_ci
      STRIPE_PRICE_STANDARD_MONTHLY: price_standard_ci
      STRIPE_PRICE_PRO_MONTHLY: price_pro_ci
      OPENAI_API_KEY: sk-ci-openai
      ANTHROPIC_API_KEY: sk-ant-ci-anthropic
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm run test:unit -- 'src/app/api/documents/[id]/route.test.ts'

  es-review-smoke:
    needs: source-branch
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt
      - name: Run deterministic ES review smoke
        run: |
          python -m pytest \
            backend/tests/es_review/test_es_review_quality_rubric.py \
            backend/tests/es_review/test_es_review_final_quality_cases.py \
            backend/tests/shared/test_llm_provider_routing.py \
            -q
