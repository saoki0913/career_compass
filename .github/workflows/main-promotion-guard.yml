name: Main Release Gate

on:
  pull_request:
    branches:
      - main

concurrency:
  group: main-release-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  source-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Require develop as PR source
        run: |
          if [ "${{ github.head_ref }}" != "develop" ] && [ "${{ github.head_ref }}" != "legal-release-20260331" ]; then
            echo "main への PR は develop からのみ許可します。" >&2
            echo "current source branch: ${{ github.head_ref }}" >&2
            exit 1
          fi

  frontend:
    needs: source-branch
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      SKIP_NPM_AUDIT: ${{ github.head_ref == 'legal-release-20260331' && '1' || '0' }}
      NEXT_PUBLIC_APP_URL: https://stg.shupass.jp
      BETTER_AUTH_URL: https://stg.shupass.jp
      BETTER_AUTH_TRUSTED_ORIGINS: https://stg.shupass.jp,http://localhost:3000,http://127.0.0.1:3000
      BETTER_AUTH_SECRET: ci-secret-please-change-me-32chars
      GOOGLE_CLIENT_ID: ci-google-client-id
      GOOGLE_CLIENT_SECRET: ci-google-client-secret
      FASTAPI_URL: https://stg-api.shupass.jp
      BACKEND_URL: https://stg-api.shupass.jp
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
      DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: ci-supabase-service-role-key
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      CRON_SECRET: ci-cron-secret
      STRIPE_SECRET_KEY: sk_test_ci
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_ci
      STRIPE_WEBHOOK_SECRET: whsec_ci
      STRIPE_PRICE_STANDARD_MONTHLY: price_standard_ci
      STRIPE_PRICE_PRO_MONTHLY: price_pro_ci
      OPENAI_API_KEY: sk-ci-openai
      ANTHROPIC_API_KEY: sk-ant-ci-anthropic
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: bash scripts/ci/run-frontend-verify.sh

  backend:
    needs: source-branch
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt
      - run: bash scripts/ci/run-backend-deterministic.sh

  security:
    needs: source-branch
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SECURITY_SCAN_INCLUDE_AUDIT: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: node scripts/security/check-api-route-csrf.mjs
      - run: bash security/scan/run-lightweight-scan.sh --fail-on=high

  staging-ready:
    needs: source-branch
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Wait for staging frontend and backend
        run: |
          for url in \
            "https://stg-api.shupass.jp/health" \
            "https://stg.shupass.jp" \
            "https://stg.shupass.jp/robots.txt" \
            "https://stg.shupass.jp/sitemap.xml"; do
            ok=0
            for _ in $(seq 1 40); do
              if curl --fail --silent --show-error "$url" >/tmp/staging-check.out; then
                ok=1
                break
              fi
              sleep 10
            done
            if [ "$ok" -ne 1 ]; then
              echo "Timed out waiting for $url" >&2
              exit 1
            fi
          done
      - name: Assert staging URLs are wired correctly
        run: |
          curl --fail --silent https://stg.shupass.jp/robots.txt | grep -F "https://stg.shupass.jp"
          curl --fail --silent https://stg.shupass.jp/sitemap.xml | grep -F "https://stg.shupass.jp"

  e2e-guest:
    needs: [source-branch, staging-ready]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      PLAYWRIGHT_BASE_URL: https://stg.shupass.jp
      PLAYWRIGHT_SKIP_WEBSERVER: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: bash scripts/ci/run-main-e2e.sh guest

  e2e-auth:
    needs: [source-branch, staging-ready]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      PLAYWRIGHT_BASE_URL: https://stg.shupass.jp
      PLAYWRIGHT_SKIP_WEBSERVER: "1"
      CI_E2E_AUTH_SECRET: ${{ secrets.CI_E2E_AUTH_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: bash scripts/ci/run-main-e2e.sh auth

  e2e-regression:
    needs: [source-branch, staging-ready]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      NEXT_PUBLIC_APP_URL: https://stg.shupass.jp
      BETTER_AUTH_URL: https://stg.shupass.jp
      BETTER_AUTH_TRUSTED_ORIGINS: https://stg.shupass.jp,http://localhost:3000,http://127.0.0.1:3000
      BETTER_AUTH_SECRET: ci-secret-please-change-me-32chars
      GOOGLE_CLIENT_ID: ci-google-client-id
      GOOGLE_CLIENT_SECRET: ci-google-client-secret
      FASTAPI_URL: https://stg-api.shupass.jp
      BACKEND_URL: https://stg-api.shupass.jp
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
      DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: ci-supabase-service-role-key
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      CRON_SECRET: ci-cron-secret
      STRIPE_SECRET_KEY: sk_test_ci
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_ci
      STRIPE_WEBHOOK_SECRET: whsec_ci
      STRIPE_PRICE_STANDARD_MONTHLY: price_standard_ci
      STRIPE_PRICE_PRO_MONTHLY: price_pro_ci
      OPENAI_API_KEY: sk-ci-openai
      ANTHROPIC_API_KEY: sk-ant-ci-anthropic
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: bash scripts/ci/run-main-e2e.sh regression
        env:
          PLAYWRIGHT_RETRIES: "2"

  ai-live-smoke:
    needs: source-branch
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      RUN_LIVE_ES_REVIEW: "1"
      LIVE_ES_REVIEW_FAIL_ON_MISSING_KEYS: "1"
      LIVE_ES_REVIEW_CASE_SET: "smoke"
      LIVE_ES_REVIEW_PROVIDERS: "gpt-5.4-mini"
      LIVE_ES_REVIEW_ENABLE_JUDGE: "0"
      LIVE_ES_REVIEW_OUTPUT_DIR: backend/tests/output
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: scope
        run: |
          changed_files="$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}")"
          # Patterns aligned with src/lib/e2e-functional-features.mjs es-review + shared triggers
          echo "$changed_files" | grep -E '^(backend/app/prompts/|backend/app/routers/es_review[^/]*\.py|backend/app/testing/es_review_live_gate\.py|backend/app/utils/llm[^/]*\.py|backend/tests/es_review/|e2e/live-ai-.*\.spec\.ts|scripts/ci/run-ai-live|scripts/ci/run-e2e-functional\.sh|playwright\.live\.config\.ts)' >/dev/null \
            && echo "run=true" >> "$GITHUB_OUTPUT" \
            || echo "run=false" >> "$GITHUB_OUTPUT"
      - name: Skip when AI-sensitive files did not change
        if: steps.scope.outputs.run != 'true'
        run: echo "No AI-sensitive files changed."
      - uses: actions/setup-node@v4
        if: steps.scope.outputs.run == 'true'
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-python@v5
        if: steps.scope.outputs.run == 'true'
        with:
          python-version: "3.11"
      - name: Install dependencies
        if: steps.scope.outputs.run == 'true'
        run: |
          npm ci
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt
      - name: Run AI live smoke
        if: steps.scope.outputs.run == 'true'
        env:
          RUN_AI_LIVE_SMOKE: "1"
        run: bash scripts/ci/run-ai-live-smoke.sh
      - name: Upload live smoke report
        if: always() && steps.scope.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ai-live-smoke-report
          path: backend/tests/output/live_es_review_smoke_*

  e2e-functional-scope:
    needs: source-branch
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      should_run: ${{ steps.resolve.outputs.e2e_functional_should_run }}
      features_json: ${{ steps.resolve.outputs.e2e_functional_features_json }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - id: resolve
        run: node tools/resolve-e2e-functional-scope.mjs --github-output >> "$GITHUB_OUTPUT"

  e2e-functional:
    needs: [staging-ready, e2e-functional-scope]
    if: needs.e2e-functional-scope.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    environment: staging
    env:
      PLAYWRIGHT_BASE_URL: https://stg.shupass.jp
      PLAYWRIGHT_SKIP_WEBSERVER: "1"
      CI_E2E_AUTH_SECRET: ${{ secrets.CI_E2E_AUTH_SECRET }}
      CI_E2E_SCOPE: e2e-functional-${{ github.run_id }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
      LIVE_AI_CONVERSATION_CASE_SET: smoke
      LIVE_AI_CONVERSATION_BLOCKING_FAILURES: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          npm ci
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Preflight CI E2E auth
        run: node scripts/ci/check-ai-live-auth.mjs --base-url "${{ env.PLAYWRIGHT_BASE_URL }}"
      - name: Reset AI live state
        run: node scripts/ci/reset-ai-live-state.mjs --base-url "${{ env.PLAYWRIGHT_BASE_URL }}"
      - name: Run AI functional smoke
        run: bash scripts/ci/run-e2e-functional.sh --features "${{ join(fromJson(needs.e2e-functional-scope.outputs.features_json), ',') }}" --suite smoke
      - name: Upload AI functional artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-functional-artifacts
          path: |
            playwright-report/**
            backend/tests/output/**

  migration-safety:
    needs: source-branch
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for destructive migration operations
        run: |
          changed_sql="$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" -- 'drizzle_pg/*.sql' 'supabase/migrations/*.sql')"
          if [ -z "$changed_sql" ]; then
            echo "No migration files changed."
            exit 0
          fi
          echo "Changed migration files:"
          echo "$changed_sql"
          echo ""
          errors=0
          for f in $changed_sql; do
            if [ ! -f "$f" ]; then
              continue
            fi
            destructive="$(grep -inE '^\s*(DROP\s+TABLE|DROP\s+COLUMN|DELETE\s+FROM|TRUNCATE|ALTER\s+TABLE\s+.*DROP\s+COLUMN)' "$f" || true)"
            if [ -n "$destructive" ]; then
              echo "::error file=$f::Destructive operation detected in migration:"
              echo "$destructive"
              errors=$((errors + 1))
            fi
          done
          if [ "$errors" -gt 0 ]; then
            echo ""
            echo "::error::$errors migration file(s) contain destructive operations (DROP TABLE, DELETE, TRUNCATE, ALTER TABLE DROP COLUMN)."
            echo "These operations can cause data loss in production. If intentional, add a comment '-- DESTRUCTIVE: <reason>' to acknowledge."
            exit 1
          fi
          echo "All migration files are safe."
