name: Develop CI

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: develop-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ui-scope:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      should_run: ${{ steps.resolve.outputs.ui_review_should_run }}
      routes_json: ${{ steps.resolve.outputs.ui_review_routes_json }}
      auth_mode: ${{ steps.resolve.outputs.ui_review_auth_mode }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - id: resolve
        run: node tools/resolve-ui-review-routes.mjs --github-output >> "$GITHUB_OUTPUT"

  ui-guardrails:
    needs: ui-scope
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        if: needs.ui-scope.outputs.should_run == 'true'
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        if: needs.ui-scope.outputs.should_run == 'true'
        with:
          node-version: 20
          cache: npm
      - name: Install and lint UI guardrails
        if: needs.ui-scope.outputs.should_run == 'true'
        run: |
          npm ci
          npm run lint:ui:guardrails
      - name: Skip UI guardrails
        if: needs.ui-scope.outputs.should_run != 'true'
        run: echo "No UI review routes; skipping lint:ui:guardrails."

  ui-review:
    needs: [ui-scope, ui-guardrails]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PLAYWRIGHT_BASE_URL: https://stg.shupass.jp
      PLAYWRIGHT_SKIP_WEBSERVER: "1"
    steps:
      - uses: actions/checkout@v4
        if: needs.ui-scope.outputs.should_run == 'true'
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        if: needs.ui-scope.outputs.should_run == 'true'
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        if: needs.ui-scope.outputs.should_run == 'true'
        run: npm ci
      - name: Install Playwright Chromium
        if: needs.ui-scope.outputs.should_run == 'true'
        run: npx playwright install --with-deps chromium
      - name: Run UI review
        if: needs.ui-scope.outputs.should_run == 'true'
        run: npm run test:ui:review -- ${{ join(fromJson(needs.ui-scope.outputs.routes_json), ' ') }} --auth=${{ needs.ui-scope.outputs.auth_mode }}
      - name: Skip UI review
        if: needs.ui-scope.outputs.should_run != 'true'
        run: echo "No UI review routes; skipping Playwright UI review."

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      NEXT_PUBLIC_APP_URL: https://stg.shupass.jp
      BETTER_AUTH_URL: https://stg.shupass.jp
      BETTER_AUTH_TRUSTED_ORIGINS: https://stg.shupass.jp,http://localhost:3000,http://127.0.0.1:3000
      BETTER_AUTH_SECRET: ci-secret-please-change-me-32chars
      GOOGLE_CLIENT_ID: ci-google-client-id
      GOOGLE_CLIENT_SECRET: ci-google-client-secret
      FASTAPI_URL: https://stg-api.shupass.jp
      BACKEND_URL: https://stg-api.shupass.jp
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
      DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: ci-supabase-service-role-key
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      CRON_SECRET: ci-cron-secret
      STRIPE_SECRET_KEY: sk_test_ci
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_ci
      STRIPE_WEBHOOK_SECRET: whsec_ci
      STRIPE_PRICE_STANDARD_MONTHLY: price_standard_ci
      STRIPE_PRICE_PRO_MONTHLY: price_pro_ci
      OPENAI_API_KEY: sk-ci-openai
      ANTHROPIC_API_KEY: sk-ant-ci-anthropic
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: bash scripts/ci/run-frontend-verify.sh

  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt
      - run: bash scripts/ci/run-backend-deterministic.sh
