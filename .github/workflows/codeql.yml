name: CodeQL

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    - cron: "0 17 * * 0"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  code-scanning-availability:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - id: check
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.request("GET /repos/{owner}/{repo}/code-scanning/default-setup", {
                owner: context.repo.owner,
                repo: context.repo.repo,
              });
              core.info("Code scanning is available for this repository.");
              core.setOutput("enabled", "true");
            } catch (error) {
              core.warning(`Skipping CodeQL because code scanning is unavailable: ${error.message}`);
              core.setOutput("enabled", "false");
            }

  analyze:
    needs:
      - code-scanning-availability
    if: needs.code-scanning-availability.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript-typescript
          - python
    name: analyze (${{ matrix.language }})
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          config-file: ./.github/codeql/codeql-config.yml
      - uses: actions/setup-node@v4
        if: matrix.language == 'javascript-typescript'
        with:
          node-version: 20
          cache: npm
      - name: Install frontend dependencies
        if: matrix.language == 'javascript-typescript'
        run: npm ci
      - uses: actions/setup-python@v5
        if: matrix.language == 'python'
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        if: matrix.language == 'python'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt
      - uses: github/codeql-action/analyze@v3
