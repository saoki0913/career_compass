name: Nightly AI Live

on:
  schedule:
    - cron: "0 14 * * *"
    - cron: "30 14 * * 0"
  workflow_dispatch:
    inputs:
      suite:
        description: "Live suite depth"
        type: choice
        required: true
        default: smoke
        options:
          - smoke
          - extended

concurrency:
  group: nightly-ai-live
  cancel-in-progress: false

jobs:
  run-live-ai:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment: staging
    env:
      PLAYWRIGHT_BASE_URL: https://stg.shupass.jp
      PLAYWRIGHT_SKIP_WEBSERVER: "1"
      CI_E2E_AUTH_SECRET: ${{ secrets.CI_E2E_AUTH_SECRET }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      AI_LIVE_PLAYWRIGHT_SPECS: e2e/live-ai-major.spec.ts e2e/live-ai-conversations.spec.ts
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          npm ci
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Resolve suite depth
        id: suite
        shell: bash
        run: |
          suite="${{ inputs.suite }}"
          if [[ -z "$suite" ]]; then
            case "${{ github.event.schedule }}" in
              "30 14 * * 0") suite="extended" ;;
              *) suite="smoke" ;;
            esac
          fi
          echo "suite=$suite" >> "$GITHUB_OUTPUT"

      - name: Run nightly live AI
        run: bash scripts/ci/run-ai-live-nightly.sh --suite "${{ steps.suite.outputs.suite }}"

      - name: Upload live AI artifacts
        if: always() && steps.suite.outputs.suite == 'smoke'
        uses: actions/upload-artifact@v4
        with:
          name: ai-live-${{ steps.suite.outputs.suite }}-${{ github.run_id }}
          path: backend/tests/output/nightly_ai_live_*
          if-no-files-found: warn
          retention-days: 30

      - name: Upload live AI artifacts (extended)
        if: always() && steps.suite.outputs.suite == 'extended'
        uses: actions/upload-artifact@v4
        with:
          name: ai-live-${{ steps.suite.outputs.suite }}-${{ github.run_id }}
          path: backend/tests/output/nightly_ai_live_*
          if-no-files-found: warn
          retention-days: 90
